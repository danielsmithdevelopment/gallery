<script>
window['ai_edge_gallery_get_result'] = async (data, secret) => {
    try {
        const jsonData = JSON.parse(data);
        const query = jsonData.query || "";
        const maxResults = jsonData.max_results || 6;
        const searchDepth = jsonData.search_depth || "basic";

        if (!query) {
            throw new Error("No search query provided");
        }

        if (!secret || !secret.startsWith("tvly-")) {
            throw new Error("Invalid or missing Tavily API key. Please add it in the skill settings.");
        }

        const response = await fetch("https://api.tavily.com/search", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": `Bearer ${secret}`
            },
            body: JSON.stringify({
                query: query,
                max_results: maxResults,
                search_depth: searchDepth,
                include_answer: true,        // Tavily can provide a quick synthesized answer
                include_raw_content: false
            })
        });

        if (!response.ok) {
            throw new Error(`Tavily API error: ${response.status}`);
        }

        const tavilyResult = await response.json();

        // Format results nicely for the agent
        const formattedResults = tavilyResult.results ? tavilyResult.results.map((r, index) => ({
            rank: index + 1,
            title: r.title,
            url: r.url,
            content: r.content,           // clean snippet optimized for LLMs
            score: r.score
        })) : [];

        return JSON.stringify({
            success: true,
            query: query,
            answer: tavilyResult.answer || "No quick answer available.",
            results: formattedResults,
            response_time: tavilyResult.response_time || null,
            note: "Results provided by Tavily. Always verify important information from the original sources."
        });

    } catch (error) {
        console.error("Web Search Skill Error:", error);
        return JSON.stringify({
            success: false,
            error: error.message || "Failed to perform web search. Check your internet connection and Tavily API key.",
            suggestion: "Try again or ask me based on my built-in knowledge."
        });
    }
};
</script>
